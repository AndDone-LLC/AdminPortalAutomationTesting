name: Run Playwright Tests

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Select Environment"
        required: true
        type: choice
        options:
          - QAT
          - UAT
          - DEV

jobs:
  playwright-test:
    environment: ${{ github.event.inputs.environment }}   # Loads correct environment secrets
    runs-on: ubuntu-latest

    env:
      APP_ENV: ${{ github.event.inputs.environment }}
      BASE_URL: ""
      ADMIN_USERNAME: ""
      ADMIN_PASSWORD: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Set environment variables based on selection
        run: |
          echo "Running on environment: ${APP_ENV}"

          # QAT environment secrets
          if [ "${APP_ENV}" = "QAT" ]; then
            echo "BASE_URL=${{ secrets.BASE_URL }}" >> $GITHUB_ENV
            echo "ADMIN_USERNAME=${{ secrets.ADMIN_USERNAME }}" >> $GITHUB_ENV
            echo "ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}" >> $GITHUB_ENV
          fi

          # UAT environment secrets
          if [ "${APP_ENV}" = "UAT" ]; then
            echo "BASE_URL=${{ secrets.BASE_URL }}" >> $GITHUB_ENV
            echo "ADMIN_USERNAME=${{ secrets.ADMIN_USERNAME }}" >> $GITHUB_ENV
            echo "ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}" >> $GITHUB_ENV
          fi

          # DEV environment secrets
          if [ "${APP_ENV}" = "DEV" ]; then
            echo "BASE_URL=${{ secrets.BASE_URL }}" >> $GITHUB_ENV
            echo "ADMIN_USERNAME=${{ secrets.ADMIN_USERNAME }}" >> $GITHUB_ENV
            echo "ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}" >> $GITHUB_ENV
          fi

      - name: Run Playwright Tests
        run: |
          echo "Using BASE_URL=$BASE_URL"
          npx playwright test

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report